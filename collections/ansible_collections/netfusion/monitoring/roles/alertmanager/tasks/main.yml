---
- name: Stop on non-Debian hosts
  ansible.builtin.meta: end_host
  when: ansible_os_family != "Debian"

- name: Install Alertmanager package
  ansible.builtin.apt:
    name:
      - prometheus-alertmanager
    state: present
    update_cache: true

- name: Ensure Alertmanager config dir exists
  ansible.builtin.file:
    path: "{{ alertmanager_config_dir }}"
    state: directory
    owner: root
    group: "{{ alertmanager_group }}"
    mode: "0755"

- name: Ensure Alertmanager data dir exists
  ansible.builtin.file:
    path: "{{ alertmanager_data_dir }}"
    state: directory
    owner: "{{ alertmanager_user }}"
    group: "{{ alertmanager_group }}"
    mode: "0750"

- name: Deploy Alertmanager config
  ansible.builtin.template:
    src: alertmanager.yml.j2
    dest: "{{ alertmanager_config_dir }}/alertmanager.yml"
    owner: root
    group: "{{ alertmanager_group }}"
    mode: "0640"
  notify: restart alertmanager

- name: Remove old custom Alertmanager systemd unit
  ansible.builtin.file:
    path: /etc/systemd/system/prometheus-alertmanager.service
    state: absent
  notify: daemon reload

- name: Override package defaults for Alertmanager
  ansible.builtin.copy:
    dest: /etc/default/prometheus-alertmanager
    owner: root
    group: root
    mode: "0644"
    content: |
      ARGS="--config.file={{ alertmanager_config_dir }}/alertmanager.yml --storage.path={{ alertmanager_data_dir }} --web.listen-address={{ alertmanager_web_listen_address }}"
  notify: restart alertmanager

- name: Ensure Alertmanager service enabled and started
  ansible.builtin.service:
    name: prometheus-alertmanager
    state: started
    enabled: true

- name: Flush handlers
  ansible.builtin.meta: flush_handlers
