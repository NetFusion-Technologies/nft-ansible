grafana_config_dir: /etc/grafana
grafana_provisioning_dir: /etc/grafana/provisioning
grafana_dashboards_dir: /var/lib/grafana/dashboards

grafana_http_addr: 0.0.0.0
grafana_http_port: 3000

grafana_prometheus_datasource_name: Prometheus
grafana_prometheus_url: "http://{{ hostvars[monitoring_prometheus_host].ansible_host | default(monitoring_prometheus_host) }}:9090"
