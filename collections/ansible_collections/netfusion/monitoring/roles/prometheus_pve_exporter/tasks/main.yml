- name: Stop on non-Debian hosts
  ansible.builtin.meta: end_host
  when: ansible_os_family != "Debian"

- name: Install prerequisites
  ansible.builtin.apt:
    name:
      - python3-pip
      - python3-venv
      - ca-certificates
    state: present
    update_cache: true

- name: Ensure exporter group exists
  ansible.builtin.group:
    name: "{{ pve_exporter_group }}"
    state: present

- name: Ensure exporter user exists
  ansible.builtin.user:
    name: "{{ pve_exporter_user }}"
    group: "{{ pve_exporter_group }}"
    system: true
    create_home: true
    home: "{{ pve_exporter_home }}"
    shell: /usr/sbin/nologin

- name: Ensure exporter home exists
  ansible.builtin.file:
    path: "{{ pve_exporter_home }}"
    state: directory
    owner: "{{ pve_exporter_user }}"
    group: "{{ pve_exporter_group }}"
    mode: "0750"

- name: Ensure venv directory exists
  ansible.builtin.file:
    path: "{{ pve_exporter_venv }}"
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Create virtual environment
  ansible.builtin.command: "python3 -m venv {{ pve_exporter_venv }}"
  args:
    creates: "{{ pve_exporter_venv }}/bin/activate"

- name: Install exporter in venv
  ansible.builtin.pip:
    name: "{{ pve_exporter_package_name }}"
    virtualenv: "{{ pve_exporter_venv }}"

- name: Ensure config dir exists
  ansible.builtin.file:
    path: "{{ pve_exporter_config_dir }}"
    state: directory
    owner: root
    group: "{{ pve_exporter_group }}"
    mode: "0750"

- name: Deploy exporter config
  ansible.builtin.template:
    src: pve.yml.j2
    dest: "{{ pve_exporter_config_file }}"
    owner: root
    group: "{{ pve_exporter_group }}"
    mode: "0640"
  notify: restart pve exporter

- name: Deploy systemd unit
  ansible.builtin.template:
    src: prometheus-pve-exporter.service.j2
    dest: /etc/systemd/system/prometheus-pve-exporter.service
    owner: root
    group: root
    mode: "0644"
  notify: restart pve exporter

- name: Reload systemd
  ansible.builtin.systemd:
    daemon_reload: true

- name: Enable and start exporter
  ansible.builtin.service:
    name: prometheus-pve-exporter
    enabled: true
    state: started

