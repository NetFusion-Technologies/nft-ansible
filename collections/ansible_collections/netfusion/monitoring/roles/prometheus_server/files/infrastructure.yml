groups:
  - name: infrastructure
    rules:
      - alert: PrometheusTargetDown
        expr: up == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Target down: {{ $labels.instance }}"
          description: "Prometheus target {{ $labels.job }} on {{ $labels.instance }} is unreachable."

      - alert: AlertmanagerDown
        expr: up{job="alertmanager"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Alertmanager down"
          description: "Prometheus cannot scrape Alertmanager on {{ $labels.instance }}."

      - alert: NodeExporterDown
        expr: up{job="node_exporter"} == 0
        for: 3m
        labels:
          severity: critical
        annotations:
          summary: "node_exporter down on {{ $labels.instance }}"
          description: "Host metrics are unavailable from {{ $labels.instance }}."

      - alert: ProxmoxExporterDown
        expr: up{job="proxmox_pve_exporter"} == 0
        for: 3m
        labels:
          severity: critical
        annotations:
          summary: "Proxmox exporter down on {{ $labels.instance }}"
          description: "Proxmox exporter scrape failed on {{ $labels.instance }}."

      - alert: ProxmoxClusterScrapeDown
        expr: up{job="proxmox_pve_cluster"} == 0
        for: 3m
        labels:
          severity: critical
        annotations:
          summary: "Proxmox cluster scrape down"
          description: "Cluster-wide Proxmox metrics scrape from {{ $labels.instance }} failed."

      - alert: RootFilesystemHighUsage
        expr: (node_filesystem_avail_bytes{mountpoint="/",fstype!~"tmpfs|overlay"} / node_filesystem_size_bytes{mountpoint="/",fstype!~"tmpfs|overlay"}) < 0.15
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Low disk space on {{ $labels.instance }}"
          description: "Root filesystem free space is below 15% on {{ $labels.instance }}."

      - alert: RootFilesystemCriticalUsage
        expr: (node_filesystem_avail_bytes{mountpoint="/",fstype!~"tmpfs|overlay"} / node_filesystem_size_bytes{mountpoint="/",fstype!~"tmpfs|overlay"}) < 0.08
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Critical disk space on {{ $labels.instance }}"
          description: "Root filesystem free space is below 8% on {{ $labels.instance }}."

      - alert: HighMemoryPressure
        expr: (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) > 0.90
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "High memory usage on {{ $labels.instance }}"
          description: "Memory usage is above 90% on {{ $labels.instance }}."

      - alert: CriticalMemoryPressure
        expr: (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) > 0.97
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Critical memory pressure on {{ $labels.instance }}"
          description: "Memory usage is above 97% on {{ $labels.instance }}."

      - alert: HighCPUUsage
        expr: 100 - (avg by(instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 90
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: "High CPU usage on {{ $labels.instance }}"
          description: "CPU usage is above 90% for 15 minutes on {{ $labels.instance }}."

      - alert: CriticalCPUUsage
        expr: 100 - (avg by(instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 97
        for: 10m
        labels:
          severity: critical
        annotations:
          summary: "Critical CPU usage on {{ $labels.instance }}"
          description: "CPU usage is above 97% for 10 minutes on {{ $labels.instance }}."

      - alert: HostLoadHigh
        expr: node_load5 > 4
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: "High load on {{ $labels.instance }}"
          description: "5-minute load average is above 4 on {{ $labels.instance }}."

      - alert: ProxmoxNodeOffline
        expr: pve_up{job="proxmox_pve_cluster", id=~"node/.*"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Proxmox node offline: {{ $labels.id }}"
          description: "The Proxmox node {{ $labels.id }} is reported offline."

      - alert: ProxmoxGuestOffline
        expr: pve_up{job="proxmox_pve_cluster", id=~"(qemu|lxc)/.*"} == 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Proxmox guest offline: {{ $labels.id }}"
          description: "The Proxmox guest {{ $labels.id }} is reported stopped or offline."

      - alert: NetdataDown
        expr: up{job="netdata"} == 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Netdata scrape failed"
          description: "Prometheus cannot scrape Netdata on {{ $labels.instance }}."
