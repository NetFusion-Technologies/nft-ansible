- name: Stop on non-Debian hosts
  ansible.builtin.meta: end_host
  when: ansible_os_family != "Debian"

- name: Install Prometheus
  ansible.builtin.apt:
    name:
      - prometheus
    state: present
    update_cache: true

- name: Ensure Prometheus rules directory exists
  ansible.builtin.file:
    path: "{{ prometheus_rules_dir }}"
    state: directory
    owner: root
    group: "{{ prometheus_group }}"
    mode: "0755"

- name: Deploy Prometheus config
  ansible.builtin.template:
    src: prometheus.yml.j2
    dest: "{{ prometheus_config_dir }}/prometheus.yml"
    owner: root
    group: "{{ prometheus_group }}"
    mode: "0644"
  notify: restart prometheus

- name: Deploy infrastructure rules
  ansible.builtin.copy:
    src: infrastructure.yml
    dest: "{{ prometheus_rules_dir }}/infrastructure.yml"
    owner: root
    group: "{{ prometheus_group }}"
    mode: "0644"
  notify: restart prometheus

- name: Configure Prometheus service arguments
  ansible.builtin.copy:
    dest: /etc/default/prometheus
    owner: root
    group: root
    mode: "0644"
    content: |
      ARGS="--config.file={{ prometheus_config_dir }}/prometheus.yml --storage.tsdb.path={{ prometheus_data_dir }} --web.listen-address={{ prometheus_web_listen_address }} --storage.tsdb.retention.time={{ prometheus_retention_time }}{% if prometheus_retention_size %} --storage.tsdb.retention.size={{ prometheus_retention_size }}{% endif %}"
  notify: restart prometheus

- name: Ensure Prometheus service enabled and started
  ansible.builtin.service:
    name: prometheus
    state: started
    enabled: true

