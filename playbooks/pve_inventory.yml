---
- name: Collect full inventory/facts from Proxmox nodes
  hosts: proxmox_nodes
  gather_facts: true
  become: true

  vars:
    ansible_connection: ssh
    ansible_ssh_common_args: '-o StrictHostKeyChecking=no'

  tasks:
    - name: Ensure python is present on apt-based systems
      ansible.builtin.apt:
        name: python3
        state: present
      when: ansible_facts['pkg_mgr'] == 'apt'

    - name: Ensure python3-apt and setuptools on apt-based systems
      ansible.builtin.apt:
        name:
          - python3-apt
          - python3-setuptools
        state: present
      when: ansible_facts['pkg_mgr'] == 'apt'

    - name: Gather detailed Ansible facts
      ansible.builtin.setup:
        gather_subset: all

    - name: Collect Proxmox-specific info via pvesh
      ansible.builtin.shell: |
        /usr/bin/pvesh get /cluster/resources || true
      register: pvesh_resources
      changed_when: false

    - name: Ensure collected archive directory exists on control node
      delegate_to: localhost
      run_once: true
      become: false
      vars:
        ansible_connection: local
      ansible.builtin.file:
        path: "{{ playbook_dir }}/../archive/collected/pve"
        state: directory
        mode: "0700"

    - name: Save safe collected facts to JSON on control node
      delegate_to: localhost
      become: false
      vars:
        ansible_connection: local
      ansible.builtin.copy:
        dest: "{{ playbook_dir }}/../archive/collected/pve/{{ inventory_hostname }}.json"
        mode: "0600"
        content: |
          {{
            {
              "host": inventory_hostname,
              "hostname": ansible_facts.hostname | default(""),
              "fqdn": ansible_facts.fqdn | default(""),
              "distribution": ansible_facts.distribution | default(""),
              "distribution_version": ansible_facts.distribution_version | default(""),
              "kernel": ansible_facts.kernel | default(""),
              "architecture": ansible_facts.architecture | default(""),
              "default_ipv4": ansible_facts.default_ipv4 | default({}),
              "default_ipv6": ansible_facts.default_ipv6 | default({}),
              "interfaces": ansible_facts.interfaces | default([]),
              "pvesh": pvesh_resources.stdout | default("")
            } | to_nice_json
          }}
